    const markers = L.layerGroup();
    const rectangles = L.layerGroup();
    const bounds = [];

    rows.forEach((row) => {
      const marker = L.circleMarker([row.lat, row.lon], {
        radius: 5,
        color: row.color,
        weight: 1,
        fillColor: row.color,
        fillOpacity: 0.9,
      }).bindTooltip(row.tooltip).bindPopup(row.popup);
      markers.addLayer(marker);

      const rectangle = L.rectangle([[row.south, row.west], [row.north, row.east]], {
        color: row.color,
        weight: 1,
        fillColor: row.color,
        fillOpacity: 0.35,
      }).bindTooltip(row.tooltip).bindPopup(row.popup);
      rectangles.addLayer(rectangle);
      bounds.push([[row.south, row.west], [row.north, row.east]]);
    });

    map.addLayer(markers);
    map.addLayer(rectangles);
    L.control.layers(null, { 'Markers': markers, 'Bounding boxes': rectangles }, { collapsed: false }).addTo(map);
    if (bounds.length) {
      const fullBounds = L.latLngBounds(bounds[0]);
      bounds.slice(1).forEach((pair) => {
        fullBounds.extend(pair[0]);
        fullBounds.extend(pair[1]);
      });
      map.fitBounds(fullBounds, { padding: [30, 30] });
    }
